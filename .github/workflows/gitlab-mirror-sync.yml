name: Sync to GitLab

# Mirrors the current working-tree content of this repo to GitLab on every
# push, as a single squashed commit with a fixed, neutral message. CI-only
# files (.github) are excluded and GitHub's git history/commit messages are
# never reused, so nothing about this automation is visible in GitLab.
# GitLab Pull Mirroring isn't available on gitlab.amcbridge.com's license
# tier, hence pushing directly from a self-hosted runner instead.
on:
  push:
    branches: ['**']
  workflow_dispatch: {}

jobs:
  sync-to-gitlab:
    # gitlab.amcbridge.com only resolves inside the AMC corporate network,
    # so this must run on the self-hosted runner on the AMC laptop, not
    # GitHub-hosted cloud runners.
    runs-on: [self-hosted, Windows]
    steps:
      - name: Sync content to GitLab
        # The machine's PowerShell execution policy blocks running the
        # generated step script by default; Bypass it for this step only.
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          GITLAB_MIRROR_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          $srcPath = Join-Path $env:RUNNER_TEMP "gh-src"
          if (Test-Path $srcPath) { Remove-Item -Recurse -Force $srcPath }

          git clone --depth 1 "https://github.com/asirchenko/freecad-manual-to-automation-sandbox.git" $srcPath
          if ($LASTEXITCODE -ne 0) { throw "git clone of GitHub source failed" }

          Remove-Item -Recurse -Force (Join-Path $srcPath ".git")
          Remove-Item -Recurse -Force (Join-Path $srcPath ".github") -ErrorAction SilentlyContinue

          Push-Location $srcPath
          try {
            git init -q
            # The runner service account (NETWORK SERVICE) has no git
            # identity of its own; set one locally so `git commit` works.
            git config user.name "Artem Sirchenko"
            git config user.email "asirchenko@amcbridge.com"
            git add -A
            git commit -q -m "Sync current project state"
            if ($LASTEXITCODE -ne 0) { throw "git commit failed" }

            git push --force "https://oauth2:$env:GITLAB_MIRROR_TOKEN@gitlab.amcbridge.com/asirchenko/freecad-manual-to-automation-sandbox.git" HEAD:main
            if ($LASTEXITCODE -ne 0) { throw "git push to GitLab failed" }
          } finally {
            Pop-Location
          }

          Remove-Item -Recurse -Force $srcPath
